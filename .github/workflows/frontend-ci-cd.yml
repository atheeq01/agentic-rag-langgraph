name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  pull_request:
    paths:
      - 'frontend/**'

permissions:
  checks: write
  contents: read
  id-token: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build (always, validates correctness)
  # ─────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://my-hr-backend-daxtykd7xq-el.a.run.app

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2a: Deploy to Live (push to main only)
  # ─────────────────────────────────────────
  deploy-live:
    name: Deploy to Firebase (Live)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Firebase Hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_APEXHR_C9436 }}
          channelId: live
          projectId: apex-hr-ca928
          entryPoint: ./frontend

  # ─────────────────────────────────────────
  # JOB 2b: Deploy Preview (PR only)
  # ─────────────────────────────────────────
  deploy-preview:
    name: Deploy Firebase Preview (PR)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Firebase Hosting (preview channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_APEXHR_C9436 }}
          projectId: apex-hr-ca928
          entryPoint: ./frontend