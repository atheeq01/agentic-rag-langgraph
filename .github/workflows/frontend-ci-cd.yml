name: Frontend CI/CD

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Dynamic Backend URL passed from backend CI'
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  pull_request:
    paths:
      - 'frontend/**'

permissions:
  checks: write
  contents: read
  id-token: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build
  # ─────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve Backend URL
        id: resolve_backend
        run: |
          if [ -n "${{ inputs.backend_url }}" ]; then
            echo "api_url=${{ inputs.backend_url }}" >> $GITHUB_OUTPUT
          else
            URL=$(gcloud secrets versions access latest --secret=BACKEND_URL --project=${{ vars.GCP_PROJECT_ID }} 2>/dev/null || true)
            if [ -n "$URL" ]; then
              echo "api_url=$URL" >> $GITHUB_OUTPUT
            else
              echo "BACKEND_URL secret not found, falling back to VITE_API_URL secret"
              echo "api_url=${{ secrets.VITE_API_URL }}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ steps.resolve_backend.outputs.api_url }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2a: Deploy to Live
  # ─────────────────────────────────────────
  deploy-live:
    name: Deploy to Firebase (Live)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Firebase Hosting (live)
        working-directory: ./frontend
        env:
          FIREBASE_SA_KEY_B64: ${{ secrets.FIREBASE_DEPLOY_SA_KEY_B64 }}
        run: |
          # Decode the Base64 Service Account key into a temporary JSON file
          echo "$FIREBASE_SA_KEY_B64" | base64 -d > firebase-credentials.json

          # Force Firebase to use this specific JSON file for authentication
          export GOOGLE_APPLICATION_CREDENTIALS="$(pwd)/firebase-credentials.json"

          # Run the deploy command
          npx firebase-tools@15.22.1 deploy --only hosting --project ${{ vars.GCP_PROJECT_ID }} --non-interactive

          # Clean up the key
          rm firebase-credentials.json

      - name: Update FRONTEND_URL to Latest
        run: |
          FRONTEND_URL="https://${{ vars.GCP_PROJECT_ID }}.web.app"
          gcloud secrets delete FRONTEND_URL --project ${{ vars.GCP_PROJECT_ID }} --quiet || true
          gcloud secrets create FRONTEND_URL --replication-policy="automatic" --project ${{ vars.GCP_PROJECT_ID }}
          echo -n "$FRONTEND_URL" | gcloud secrets versions add FRONTEND_URL --data-file=- --project ${{ vars.GCP_PROJECT_ID }} --quiet

  # ─────────────────────────────────────────
  # JOB 2b: Deploy Preview (PR only)
  # ─────────────────────────────────────────
  deploy-preview:
    name: Deploy Firebase Preview (PR)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Firebase Hosting (preview)
        working-directory: ./frontend
        env:
          FIREBASE_SA_KEY_B64: ${{ secrets.FIREBASE_DEPLOY_SA_KEY_B64 }}
        run: |
          # Decode the Base64 Service Account key into a temporary JSON file
          echo "$FIREBASE_SA_KEY_B64" | base64 -d > firebase-credentials.json

          # Force Firebase to use this specific JSON file for authentication
          export GOOGLE_APPLICATION_CREDENTIALS="$(pwd)/firebase-credentials.json"

          # Run the channel deploy command
          npx firebase-tools@15.22.1 hosting:channel:deploy pr-${{ github.event.number }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --expires 7d

          # Clean up the key
          rm firebase-credentials.json