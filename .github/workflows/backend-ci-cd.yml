name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    paths:
      - 'backend/**'

permissions:
  contents: read
  id-token: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run Tests
  # ─────────────────────────────────────────
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite:///:memory:"
      SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      FRONTEND_URL: "http://localhost:5173"
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_CLIENT_ID: "dummy-for-tests"
      GOOGLE_CLIENT_SECRET: "dummy-for-tests"
      GOOGLE_REDIRECT_URI: "http://localhost:8000/auth/google/callback"
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      GCS_BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME }}
      ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
      HR_DEPARTMENT_EMAIL: ${{ secrets.HR_DEPARTMENT_EMAIL }}
      SYSTEM_EMAIL_ADDRESS: ${{ secrets.SYSTEM_EMAIL_ADDRESS }}
      SYSTEM_EMAIL_APP_PASSWORD: ${{ secrets.SYSTEM_EMAIL_APP_PASSWORD }}
      DEFAULT_MODEL: "gemini-3-flash-preview"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}


      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest backend/app/tests/ -v --tb=short

  # ─────────────────────────────────────────
  # JOB 2: Deploy to Cloud Run
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run
        working-directory: ./backend
        run: |
          gcloud run deploy my-hr-backend \
            --source . \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --add-cloudsql-instances="${{ secrets.GCP_CLOUDSQL_INSTANCE }}" \
            --set-secrets="ACCESS_TOKEN_EXPIRE_MINUTES=ACCESS_TOKEN_EXPIRE_MINUTES:latest,ALGORITHM=ALGORITHM:latest,DATABASE_URL=DATABASE_URL:latest,DEFAULT_MODEL=DEFAULT_MODEL:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,FRONTEND_URL=FRONTEND_URL:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,HR_DEPARTMENT_EMAIL=HR_DEPARTMENT_EMAIL:latest,PINECONE_API_KEY=PINECONE_API_KEY:latest,SECRET_KEY=SECRET_KEY:latest,SYSTEM_EMAIL_ADDRESS=SYSTEM_EMAIL_ADDRESS:latest,SYSTEM_EMAIL_APP_PASSWORD=SYSTEM_EMAIL_APP_PASSWORD:latest,GOOGLE_REDIRECT_URI=GOOGLE_REDIRECT_URI:latest"

      - name: Update GOOGLE_REDIRECT_URI
        run: |
          BACKEND_URL=$(gcloud run services describe my-hr-backend --region ${{ vars.GCP_REGION }} --format='value(status.url)' --quiet)
          FULL_CALLBACK_URL="${BACKEND_URL}/auth/google/callback"
          gcloud secrets delete GOOGLE_REDIRECT_URI --project ${{ vars.GCP_PROJECT_ID }} --quiet || true
          gcloud secrets create GOOGLE_REDIRECT_URI --replication-policy="automatic" --project ${{ vars.GCP_PROJECT_ID }}
          echo -n "$FULL_CALLBACK_URL" | gcloud secrets versions add GOOGLE_REDIRECT_URI --data-file=- --project ${{ vars.GCP_PROJECT_ID }} --quiet

      - name: Print deployed URL
        id: get_url
        run: |
          URL=$(gcloud run services describe my-hr-backend \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "✅ Backend deployed to: $URL"
          echo "backend_url=$URL" >> $GITHUB_OUTPUT

      - name: Trigger Frontend Redeploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKEND_URL: ${{ steps.get_url.outputs.backend_url }}
        run: |
          # Kick off the frontend workflow so it rebuilds with the new backend URL
          gh workflow run frontend-ci-cd.yml \
            --repo ${{ github.repository }} \
            --ref main \
            -f backend_url="$BACKEND_URL"
          echo "✅ Frontend redeploy triggered"