name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    paths:
      - 'backend/**'

# Required for Workload Identity Federation (keyless GCP auth)
permissions:
  contents: read
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run Tests (always, on push & PR)
  # ─────────────────────────────────────────
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    env:
      # Minimal env vars needed so the app imports without crashing.
      # Tests use SQLite in-memory (configured in conftest.py), so no real DB needed.
      DATABASE_URL: "sqlite:///:memory:"
      SECRET_KEY: "test-secret-key-for-ci"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      FRONTEND_URL: "http://localhost:5173"
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_CLIENT_ID: "dummy-for-tests"
      GOOGLE_CLIENT_SECRET: "dummy-for-tests"
      GOOGLE_REDIRECT_URI: "http://localhost:8000/auth/google/callback"
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      GCS_BUCKET_NAME: "dummy-bucket"
      ENCRYPTION_KEY: "r-Xk_A4L3QZw9jG7t_yVvBqN2P8sE0oK5fC1mU6xWJI="
      HR_DEPARTMENT_EMAIL: "hr@example.com"
      SYSTEM_EMAIL_ADDRESS: "sys@example.com"
      SYSTEM_EMAIL_APP_PASSWORD: "dummy"
      DEFAULT_MODEL: "gemini-3-flash-preview"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest backend/app/tests/ -v --tb=short

  # ─────────────────────────────────────────
  # JOB 2: Deploy to Cloud Run (push to main only, after tests pass)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/900628274880/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@project-0c2bab5e-90a8-4a07-ab2.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (source-based)
        working-directory: ./backend
        run: |
          gcloud run deploy my-hr-backend \
            --source . \
            --region asia-south1 \
            --allow-unauthenticated \
            --add-cloudsql-instances="project-0c2bab5e-90a8-4a07-ab2:asia-south1:apexhr" \
            --set-secrets="ACCESS_TOKEN_EXPIRE_MINUTES=ACCESS_TOKEN_EXPIRE_MINUTES:latest,ALGORITHM=ALGORITHM:latest,DATABASE_URL=DATABASE_URL:latest,DEFAULT_MODEL=DEFAULT_MODEL:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,FRONTEND_URL=FRONTEND_URL:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,HR_DEPARTMENT_EMAIL=HR_DEPARTMENT_EMAIL:latest,PINECONE_API_KEY=PINECONE_API_KEY:latest,SECRET_KEY=SECRET_KEY:latest,SYSTEM_EMAIL_ADDRESS=SYSTEM_EMAIL_ADDRESS:latest,SYSTEM_EMAIL_APP_PASSWORD=SYSTEM_EMAIL_APP_PASSWORD:latest,GOOGLE_REDIRECT_URI=GOOGLE_REDIRECT_URI:latest"
      - name: Print deployed URL
        run: |
          URL=$(gcloud run services describe my-hr-backend \
            --region asia-south1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "✅ Backend deployed to: $URL"
